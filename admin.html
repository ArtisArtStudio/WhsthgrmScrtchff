<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADMIN — Scratch Game Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Tokens ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #686666;
      --surface:  #161616;
      --border:   #2a2a2a;
      --accent:   #f0c040;
      --accent2:  #e05a2b;
      --text:     #ffffff;
      --muted:    #fffbfb;
      --success:  #3ecf70;
      --error:    #e05a2b;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
      --radius:   2px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 48px 16px 80px;
    }

    /* ─── Layout ─────────────────────────────────────── */
    .shell {
      width: 100%;
      max-width: 720px;
    }

    /* ─── Header ─────────────────────────────────────── */
    header {
      border-bottom: 2px solid var(--accent);
      padding-bottom: 20px;
      margin-bottom: 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
    }

    .header-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    header h1 {
      font-family: var(--mono);
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1;
      color: var(--text);
    }

    .badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      background: var(--accent2);
      color: #fff;
      padding: 4px 10px;
      border-radius: var(--radius);
      white-space: nowrap;
      align-self: flex-end;
    }

    /* ─── Form Card ──────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 24px;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ─── Field Groups ───────────────────────────────── */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    @media (max-width: 500px) {
      .field-grid { grid-template-columns: 1fr; }
      .card { padding: 20px; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    label span {
      color: var(--accent2);
      margin-left: 2px;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: -4px;
    }

    /* ─── Inputs ─────────────────────────────────────── */
    input[type="number"],
    input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      padding: 11px 14px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }

    input[type="number"]:focus,
    input[type="text"]:focus {
      border-color: var(--accent);
    }

    /* ─── File Dropzones ─────────────────────────────── */
    .dropzone {
      position: relative;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      overflow: hidden;
    }

    .dropzone:hover,
    .dropzone.drag-over {
      border-color: var(--accent);
      background: rgba(240,192,64,.04);
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .dropzone-icon {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .dropzone-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .1em;
    }

    .dropzone-name {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      margin-top: 6px;
      font-weight: 600;
      word-break: break-all;
    }

    /* ─── Divider ─────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    /* ─── Preview Row ─────────────────────────────────── */
    .preview-row {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: var(--radius);
      margin-bottom: 24px;
    }

    .preview-row .key {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .1em;
      min-width: 110px;
    }

    .preview-row .val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      word-break: break-all;
    }

    /* ─── Submit Button ───────────────────────────────── */
    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #0e0e0e;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: background .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-submit:hover:not(:disabled) { background: #f5d060; }
    .btn-submit:active:not(:disabled) { transform: translateY(1px); }
    .btn-submit:disabled { opacity: .4; cursor: not-allowed; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Result Panel ────────────────────────────────── */
    #result-panel {
      display: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .result-header.success { background: rgba(62,207,112,.1); color: var(--success); border-bottom: 1px solid rgba(62,207,112,.2); }
    .result-header.error   { background: rgba(224,90,43,.1);  color: var(--error);   border-bottom: 1px solid rgba(224,90,43,.2); }

    .result-body {
      background: var(--surface);
      padding: 20px;
    }

    .result-field {
      margin-bottom: 14px;
    }

    .result-field:last-child { margin-bottom: 0; }

    .result-field-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .result-link {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
      display: inline-block;
    }

    .result-link:hover { text-decoration: underline; }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      padding: 4px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 8px;
      transition: border-color .15s, color .15s;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .error-msg {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--error);
    }

    /* ─── Footer ──────────────────────────────────────── */
    footer {
      margin-top: 48px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .1em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="shell">

    <!-- Header -->
    <header>
      <div>
        <p class="header-label">Internal Tool</p>
        <h1>Scratch Game<br>Admin Setup</h1>
      </div>
      <span class="badge">PRIVATE</span>
    </header>

    <!-- Form Card -->
    <div class="card">
      <p class="card-title">01 — Game Configuration</p>

      <div class="field-grid">

        <!-- Max Players -->
        <div class="field">
          <label for="maxPlayers">Max Players <span>*</span></label>
          <input type="number" id="maxPlayers" min="2" max="20" placeholder="e.g. 10" required />
        </div>

        <!-- Groom's Name -->
        <div class="field">
          <label for="groomName">Groom's Name <span>*</span></label>
          <input type="text" id="groomName" maxlength="50" placeholder="e.g. John" required />
        </div>

        <!-- Winner Index (auto) -->
        <div class="field">
          <label>Winner Index</label>
          <input type="text" id="winnerPreview" readonly placeholder="Auto-generated on submit" />
          <span class="hint">← random 1..maxPlayers</span>
        </div>

        <!-- Game ID preview -->
        <div class="field full">
          <label>Game ID <span>*</span></label>
          <input type="text" id="gameIdPreview" readonly placeholder="Generated on submit" />
          <span class="hint">← timestamp-based unique ID</span>
        </div>

      </div>

      <hr class="divider" />
      <p class="card-title">02 — Image</p>

      <!-- Groom dropzone (single image) -->
      <div class="field">
        <label>Groom Image <span>*</span></label>
        <div class="dropzone" id="dz-groom">
          <input type="file" id="groomImage" accept="image/*" required />
          <div class="dropzone-icon">🤵</div>
          <div class="dropzone-label">Click or drop</div>
          <div class="dropzone-name" id="groom-name"></div>
        </div>
      </div>
    </div>

    <!-- Config Preview -->
    <div class="card" style="padding:20px 24px;">
      <p class="card-title">03 — Endpoint</p>
      <div class="preview-row">
        <span class="key">GAS URL</span>
        <span class="val" id="endpoint-display">— paste in admin.js</span>
      </div>
    </div>

    <!-- Submit -->
    <button class="btn-submit" id="submit-btn" type="button">
      <div class="spinner" id="spinner"></div>
      <span id="btn-label">Create Game</span>
    </button>

    <!-- Result Panel -->
    <div id="result-panel" style="margin-top:24px">
      <div class="result-header" id="result-header"></div>
      <div class="result-body" id="result-body"></div>
    </div>

    <footer>admin.js · github pages · no auth · internal use only</footer>
  </div>

  <script src="admin.js"></script>
</body>
</html>
